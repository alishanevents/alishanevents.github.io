<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="auth-section">

        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>

        <div class="auth-card">

            <h2>Login</h2>

            <form id="loginForm">

                <input type="email" id="email" class="auth-input" placeholder="Email" required>

                <input type="password" id="password" class="auth-input" placeholder="Password" required>

                <button type="submit" class="auth-btn">

                    Login

                </button>

            </form>

            <button class="auth-btn guest-btn" onclick="continueGuest()">

                Continue as Guest

            </button>

            <div class="auth-link">

                Don't have account?

                <a href="signup.html">

                    Signup

                </a>

            </div>

        </div>

    </section>

    <script src="auth.js"></script>

</body>

</html>
